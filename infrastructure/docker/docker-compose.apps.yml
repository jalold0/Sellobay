# Apps uchun (lokal Docker-da to'liq stack ko'tarish)
# Foydalanish: docker compose -f docker-compose.yml -f docker-compose.apps.yml up
name: ecommerce-apps

services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce?schema=public
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      JWT_SECRET: change-me
      JWT_REFRESH_SECRET: change-me-too
    ports:
      - "4000:4000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  wms:
    build:
      context: ../..
      dockerfile: apps/wms/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce?schema=public
    ports:
      - "4001:4001"
    depends_on:
      postgres: { condition: service_healthy }

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

  telegram-bot:
    build:
      context: ../..
      dockerfile: apps/telegram-bot/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      - api
