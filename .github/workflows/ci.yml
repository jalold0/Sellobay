name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest
    env:
      # Prisma client generatsiyasi va Next build vaqtidagi schema validatsiyasi uchun
      # placeholder (CI'da haqiqiy DB'ga ulanilmaydi)
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma client typecheck va build uchun kerak (DB'ga ulanmaydi)
      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Vercel'da deploy bo'ladigan Next.js app'lari (web, admin, seller)
      - name: Build (deployable apps)
        run: pnpm turbo run build --filter=@ecom/web --filter=@ecom/admin --filter=@ecom/seller
