name: CodeQL

# CodeQL private repo'da GitHub Advanced Security (pullik) talab qiladi.
# Avtomatik ishlatmaymiz (qizil bermasligi uchun) — faqat qo'lda ishga tushiriladi.
# Repo public bo'lsa yoki GHAS yoqilsa, push/schedule trigger'larini qайта qo'shsa bo'ladi.
on:
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: { languages: ${{ matrix.language }} }
      - uses: github/codeql-action/analyze@v3
        with: { category: '/language:${{ matrix.language }}' }
