name: CodeQL

# CodeQL private repo'da GitHub Advanced Security talab qiladi. Har push'ni
# bloklamasligi uchun faqat haftalik jadval va qo'lda ishga tushirishda yuriladi.
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: { languages: ${{ matrix.language }} }
      - uses: github/codeql-action/analyze@v3
        with: { category: '/language:${{ matrix.language }}' }
